<div class="placeholder-image">
  <div class="placeholder-image-inner">
    <svg class="placeholder-image-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
    <p class="placeholder-image-desc">{{ include.description }}</p>
    {% if include.portal_url %}
    <a href="{{ include.portal_url }}" class="placeholder-image-link" target="_blank" rel="noopener">View in Entra portal &rarr;</a>
    {% endif %}
  </div>
</div>
