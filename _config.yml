title: "The techBrandon Blog"
description: >-
  Security, identity, and infrastructure.
  Welcome and thanks for coming.
  Here you can find all of my original content or links to things I've done either professionally or personally.
baseurl: ""
url: "https://techbrandon.github.io"
twitter_username: techBrandon
github_username:  techBrandon

markdown: kramdown
permalink: pretty

sass:
  style: compressed

exclude:
  - src/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude/
  - .github/
  - "untitled folder/"

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: "passkey-path/it-admin"
    values:
      role: "IT Admin"
      role_color: "#58a6ff"
      role_hub: "/passkey-path/it-admin/"
  - scope:
      path: "passkey-path/end-user"
    values:
      role: "End User"
      role_color: "#3fb950"
      role_hub: "/passkey-path/end-user/"
  - scope:
      path: "passkey-path/security"
    values:
      role: "Security Lead"
      role_color: "#d29922"
      role_hub: "/passkey-path/security/"
  - scope:
      path: "passkey-path/helpdesk"
    values:
      role: "Helpdesk"
      role_color: "#f85149"
      role_hub: "/passkey-path/helpdesk/"
  - scope:
      path: "passkey-path/shared"
    values:
      role: "Shared"
      role_color: "#8b949e"
      role_hub: "/passkey-path/"
